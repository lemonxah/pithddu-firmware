dependencies:
  idf: ">=5.3"
  # TinyUSB wrapper providing a composite CDC-ACM + HID device. The ESP32-S3
  # exposes a USB-OTG peripheral; SimHub talks to the CDC port and the game
  # sees the HID gamepad (touch button box).
  espressif/esp_tinyusb: ">=2.2.0"
  # Addressable WS2812 driver (RMT backend) for the rev-counter + TC/ABS LEDs.
  espressif/led_strip: "~2.5.5"
  # LovyanGFX: dual ST7796 SPI panels + XPT2046 touch, all on one SPI bus.
  # Not on the Espressif registry — pulled straight from GitHub by tag.
  lovyangfx:
    git: https://github.com/lovyan03/LovyanGFX.git
    version: "1.2.21"
