name: firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { board: xiao_s3,    target: esp32s3 }
          - { board: devkitc_s3, target: esp32s3 }
          - { board: devkit_s2,  target: esp32s2 }
          - { board: s2_mini,    target: esp32s2 }
    name: ${{ matrix.board }} (${{ matrix.target }})
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: ${{ matrix.target }}
          command: idf.py -DBOARD=${{ matrix.board }} build

      - name: Package
        run: |
          set -e
          out="pithddu-${{ matrix.board }}"
          mkdir -p "$out"
          cp build/pithddu.bin "$out/"
          cp build/bootloader/bootloader.bin "$out/"
          cp build/partition_table/partition-table.bin "$out/"
          cp build/ota_data_initial.bin "$out/"
          cat > "$out/flash.txt" <<EOF
          Flash ${{ matrix.board }} (${{ matrix.target }}) with esptool:

            esptool.py -p <PORT> -b 460800 --chip ${{ matrix.target }} write_flash \\
              0x0 bootloader.bin \\
              0x8000 partition-table.bin \\
              0xf000 ota_data_initial.bin \\
              0x20000 pithddu.bin

          Or, from the firmware repo:  idf.py -DBOARD=${{ matrix.board }} -p <PORT> flash
          EOF
          zip -r "$out.zip" "$out"
          # Bare app image for OTA (the dashboard downloads this directly by board name).
          cp build/pithddu.bin "$out.bin"

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: |
            pithddu-${{ matrix.board }}.zip
            pithddu-${{ matrix.board }}.bin
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.zip
            dist/**/*.bin
          generate_release_notes: true
          fail_on_unmatched_files: true
